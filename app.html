<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>創作 — WireVision 線視</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        :root { --bg:#0a0a0f; --panel:#12121a; --border:#1e1e2e; --text:#eee; --muted:#888; --accent:#3b82f6; }
        body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans TC',sans-serif; background:var(--bg); color:var(--text); }
        a { color:var(--accent); text-decoration:none; }
        .nav { display:flex; justify-content:space-between; align-items:center; padding:14px 20px; border-bottom:1px solid var(--border); }
        .nav .logo { font-weight:700; cursor:pointer; }
        .usage { font-size:.85rem; color:var(--muted); }
        .usage strong { color:var(--accent); }
        .badge { font-size:.65rem; font-weight:700; padding:3px 8px; border-radius:999px; background:rgba(59,130,246,.15); color:var(--accent); border:1px solid rgba(59,130,246,.3); }
        .main { display:grid; grid-template-columns:380px 1fr; gap:24px; max-width:1200px; margin:0 auto; padding:24px; }
        .panel { background:var(--panel); border:1px solid var(--border); border-radius:14px; padding:20px; }
        .panel h3 { font-size:.95rem; margin-bottom:14px; }
        .panel h3 i { color:var(--accent); margin-right:6px; }
        .upload-zone { border:2px dashed var(--border); border-radius:10px; padding:32px; text-align:center; cursor:pointer; margin-bottom:16px; transition:all .2s; }
        .upload-zone:hover { border-color:var(--accent); }
        .upload-zone i { font-size:2rem; color:var(--accent); display:block; margin-bottom:8px; }
        .upload-zone input { display:none; }
        .upload-zone .label { font-size:.85rem; color:var(--muted); }
        .file-info { background:rgba(59,130,246,.1); border:1px solid rgba(59,130,246,.2); border-radius:8px; padding:10px; margin-bottom:16px; font-size:.85rem; display:none; }
        .file-info i { color:var(--accent); margin-right:6px; }
        .style-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:16px; }
        .style-opt { padding:12px 6px; background:rgba(0,0,0,.2); border:1px solid var(--border); border-radius:8px; text-align:center; cursor:pointer; font-size:.8rem; transition:all .2s; }
        .style-opt:hover { border-color:var(--accent); }
        .style-opt.sel { border-color:var(--accent); background:rgba(59,130,246,.08); }
        .style-opt .emoji { font-size:1.5rem; display:block; margin-bottom:4px; }
        .ratio-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:16px; }
        .ratio-opt { padding:10px; background:rgba(0,0,0,.2); border:1px solid var(--border); border-radius:8px; text-align:center; cursor:pointer; font-size:.85rem; transition:all .2s; }
        .ratio-opt:hover { border-color:var(--accent); }
        .ratio-opt.sel { border-color:var(--accent); background:rgba(59,130,246,.08); }
        .gen-btn { width:100%; padding:14px; background:var(--accent); color:#fff; border:none; border-radius:10px; font-size:1rem; font-weight:700; cursor:pointer; transition:all .2s; }
        .gen-btn:hover { background:#2563eb; }
        .gen-btn:disabled { opacity:.5; cursor:not-allowed; }
        .result { min-height:400px; }
        .empty { text-align:center; padding:60px 20px; color:var(--muted); }
        .empty i { font-size:3rem; opacity:.3; display:block; margin-bottom:12px; }
        .spin { animation:spin 1s linear infinite; }
        @keyframes spin { to { transform:rotate(360deg); } }
        .video-card { background:var(--panel); border:1px solid var(--border); border-radius:10px; overflow:hidden; }
        .video-card video { width:100%; display:block; }
        .video-card .meta { padding:12px; font-size:.85rem; color:var(--muted); display:flex; justify-content:space-between; align-items:center; }
        .download-btn { display:inline-flex; align-items:center; gap:6px; padding:8px 16px; background:rgba(59,130,246,.15); border:1px solid rgba(59,130,246,.3); border-radius:8px; color:var(--accent); cursor:pointer; font-size:.85rem; text-decoration:none; }
        .download-btn:hover { background:rgba(59,130,246,.25); }
        @media(max-width:768px) { .main { grid-template-columns:1fr; } }
    </style>
</head>
<body>
<nav class="nav">
    <div class="logo" onclick="location.href='index.html'">🎬 WireVision 線視</div>
    <div style="display:flex;align-items:center;gap:14px;">
        <span class="usage" id="usageDisplay"><strong>5</strong>/5 部可用</span>
        <span class="badge">FREE</span>
    </div>
</nav>

<div class="main">
    <div>
        <div class="panel" style="margin-bottom:14px;">
            <h3><i class="fa-solid fa-music"></i> 上傳音樂</h3>
            <div class="upload-zone" id="uploadZone" onclick="document.getElementById('audioFile').click()">
                <i class="fa-solid fa-cloud-arrow-up"></i>
                <div class="label">點擊上傳音樂檔案</div>
                <div style="font-size:.75rem;color:var(--muted);margin-top:4px;">MP3, WAV, FLAC (最大 50MB)</div>
                <input type="file" id="audioFile" accept="audio/*" onchange="handleFile(this)">
            </div>
            <div class="file-info" id="fileInfo"><i class="fa-solid fa-file-audio"></i> <span id="fileName"></span></div>

            <h3><i class="fa-solid fa-palette"></i> 視覺風格</h3>
            <div class="style-grid" id="styleGrid">
                <div class="style-opt sel" data-style="cyberpunk"><span class="emoji">🌆</span>賽博龐克</div>
                <div class="style-opt" data-style="minimal"><span class="emoji">⬜</span>極簡</div>
                <div class="style-opt" data-style="retro"><span class="emoji">📼</span>復古</div>
                <div class="style-opt" data-style="nature"><span class="emoji">🌿</span>自然</div>
                <div class="style-opt" data-style="abstract"><span class="emoji">🎨</span>抽象</div>
                <div class="style-opt" data-style="waveform"><span class="emoji">🌊</span>波形</div>
            </div>

            <h3><i class="fa-solid fa-crop"></i> 影片比例</h3>
            <div class="ratio-grid">
                <div class="ratio-opt sel" data-ratio="16:9">16:9</div>
                <div class="ratio-opt" data-ratio="9:16">9:16</div>
                <div class="ratio-opt" data-ratio="1:1">1:1</div>
            </div>

            <button class="gen-btn" id="genBtn" onclick="generate()">
                <i class="fa-solid fa-film"></i> 生成 MV
            </button>
        </div>
    </div>

    <div class="result" id="resultArea">
        <div class="empty">
            <i class="fa-solid fa-video"></i>
            <p>上傳音樂，開始製作你的 MV</p>
        </div>
    </div>
</div>

<script>
const API = '';
let selectedStyle = 'cyberpunk';
let selectedRatio = '16:9';
let audioFile = null;

function handleFile(input) {
    if (input.files.length > 0) {
        audioFile = input.files[0];
        document.getElementById('fileName').textContent = audioFile.name;
        document.getElementById('fileInfo').style.display = 'block';
    }
}

document.querySelectorAll('.style-opt').forEach(el => {
    el.addEventListener('click', () => {
        document.querySelectorAll('.style-opt').forEach(x => x.classList.remove('sel'));
        el.classList.add('sel');
        selectedStyle = el.dataset.style;
    });
});

document.querySelectorAll('.ratio-opt').forEach(el => {
    el.addEventListener('click', () => {
        document.querySelectorAll('.ratio-opt').forEach(x => x.classList.remove('sel'));
        el.classList.add('sel');
        selectedRatio = el.dataset.ratio;
    });
});

async function generate() {
    if (!audioFile) return alert('請先上傳音樂檔案');
    
    const btn = document.getElementById('genBtn');
    btn.disabled = true;
    btn.innerHTML = '<i class="fa-solid fa-spinner spin"></i> 生成中...';
    
    document.getElementById('resultArea').innerHTML = '<div class="empty"><i class="fa-solid fa-spinner spin" style="font-size:2rem;"></i><p style="margin-top:12px;">AI 正在分析音樂並生成 MV，請稍候...</p></div>';
    
    try {
        const formData = new FormData();
        formData.append('audio', audioFile);
        formData.append('style', selectedStyle);
        formData.append('ratio', selectedRatio);
        
        const res = await fetch(API + '/api/generate', { method: 'POST', body: formData });
        const data = await res.json();
        
        if (data.success) {
            showResult(data);
        } else {
            showError(data.error || '生成失敗');
        }
    } catch (err) {
        showError('連線失敗: ' + err.message);
    }
    
    btn.disabled = false;
    btn.innerHTML = '<i class="fa-solid fa-film"></i> 生成 MV';
}

function showResult(data) {
    const videoUrl = data.video_url || data.url;
    document.getElementById('resultArea').innerHTML = `
        <div class="video-card">
            <video controls src="${videoUrl}"></video>
            <div class="meta">
                <span>風格: ${selectedStyle} · 比例: ${selectedRatio}</span>
                <a href="${videoUrl}" download class="download-btn"><i class="fa-solid fa-download"></i> 下載 MP4</a>
            </div>
        </div>
    `;
}

function showError(msg) {
    document.getElementById('resultArea').innerHTML = `<div class="empty"><i class="fa-solid fa-triangle-exclamation"></i><p>${msg}</p></div>`;
}
</script>
</body>
</html>
